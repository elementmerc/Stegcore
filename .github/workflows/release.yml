name: Build & Release

# Triggers on a pushed version tag: v2.0.0, v2.1.3, etc.
# Run manually via Actions → "Run workflow" by setting a version input.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. v2.1.0)"
        required: true

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # Linux — onedir binary, zipped for distribution
  # ──────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y upx-ucl

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            customtkinter Pillow "numpy<2" ascon cryptography \
            argon2-cffi pyzstd typer rich \
            pyinstaller

      - name: Build binaries
        run: pyinstaller $GITHUB_WORKSPACE/stegcore-linux.spec

      - name: Smoke-test CLI binary
        run: |
          ./dist/stegcore/stegcore --help
          ./dist/stegcore/stegcore ciphers

      - name: Zip onedir outputs
        run: |
          cd dist
          zip -r stegcore-linux.zip stegcore/
          zip -r stegcore-gui-linux.zip stegcore-gui/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            dist/stegcore-linux.zip
            dist/stegcore-gui-linux.zip
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Windows — onedir .exe, zipped for distribution
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UPX
        run: |
          $upxUrl = "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip"
          Invoke-WebRequest $upxUrl -OutFile upx.zip
          Expand-Archive upx.zip -DestinationPath upx_dir
          $upxPath = (Get-ChildItem upx_dir -Recurse -Filter "upx.exe").DirectoryName
          echo $upxPath | Out-File -Append -FilePath $env:GITHUB_PATH
        shell: pwsh

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install `
            customtkinter Pillow numpy ascon cryptography `
            argon2-cffi pyzstd typer rich `
            pyinstaller
        shell: pwsh

      - name: Build binaries
        working-directory: ${{ github.workspace }}
        run: pyinstaller $env:GITHUB_WORKSPACE\stegcore-windows.spec
        shell: pwsh
        env:
          PYTHONUTF8: "1"

      - name: Smoke-test CLI binary
        run: |
          .\dist\stegcore\stegcore.exe --help
          .\dist\stegcore\stegcore.exe ciphers
        shell: pwsh

      - name: Zip onedir outputs
        run: |
          Compress-Archive -Path dist\stegcore\*     -DestinationPath dist\stegcore-windows.zip
          Compress-Archive -Path dist\stegcore-gui\* -DestinationPath dist\stegcore-gui-windows.zip
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            dist\stegcore-windows.zip
            dist\stegcore-gui-windows.zip
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # macOS — onedir CLI + .app bundle
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    runs-on: macos-14        # Apple Silicon (arm64); change to macos-13 for Intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UPX
        run: brew install upx

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            customtkinter Pillow numpy ascon cryptography \
            argon2-cffi pyzstd typer rich \
            pyinstaller

      - name: Build binaries
        run: pyinstaller $GITHUB_WORKSPACE/stegcore-macos.spec

      - name: Smoke-test CLI binary
        run: |
          ./dist/stegcore/stegcore --help
          ./dist/stegcore/stegcore ciphers

      - name: Zip CLI onedir output
        run: |
          cd dist
          zip -r stegcore-macos.zip stegcore/

      - name: Zip the .app bundle
        # Preserves macOS extended attributes and symlinks inside .app bundles
        run: |
          cd dist
          zip -r --symlinks Stegcore.app.zip Stegcore.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            dist/stegcore-macos.zip
            dist/Stegcore.app.zip
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Release — download all platform artifacts and publish to GitHub
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: release-assets/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: release-assets/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-binaries
          path: release-assets/macos

      - name: Rename and stage assets
        run: |
          VERSION=${{ steps.version.outputs.tag }}

          # Linux
          mv release-assets/linux/stegcore-linux.zip         release-assets/stegcore-${VERSION}-linux-x86_64.zip
          mv release-assets/linux/stegcore-gui-linux.zip     release-assets/stegcore-gui-${VERSION}-linux-x86_64.zip

          # Windows
          mv release-assets/windows/stegcore-windows.zip     release-assets/stegcore-${VERSION}-windows-x86_64.zip
          mv release-assets/windows/stegcore-gui-windows.zip release-assets/stegcore-gui-${VERSION}-windows-x86_64.zip

          # macOS
          mv release-assets/macos/stegcore-macos.zip         release-assets/stegcore-${VERSION}-macos-arm64.zip
          mv release-assets/macos/Stegcore.app.zip           release-assets/Stegcore-${VERSION}-macos-arm64.app.zip

      - name: Extract changelog entry for this version
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          VER=${VERSION#v}
          awk "/^## \[${VER}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md > release_body.md
          if [ ! -s release_body.md ]; then
            echo "Release ${VERSION}" > release_body.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Stegcore ${{ steps.version.outputs.tag }}"
          body_path: release_body.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: release-assets/stegcore-*