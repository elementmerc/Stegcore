name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. v2.1.0)"
        required: false

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # Linux — single merged onedir binary + stegcore-gui symlink
  # ──────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y upx-ucl

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            customtkinter Pillow "numpy<2" ascon cryptography \
            argon2-cffi pyzstd typer rich \
            pyinstaller

      - name: Build binary
        run: pyinstaller $GITHUB_WORKSPACE/stegcore-linux.spec

      - name: Create stegcore-gui symlink
        run: ln -s stegcore dist/stegcore/stegcore-gui

      - name: Smoke-test CLI mode
        run: |
          ./dist/stegcore/stegcore --help
          ./dist/stegcore/stegcore ciphers

      - name: Smoke-test GUI mode (symlink name detection)
        run: |
          test -L dist/stegcore/stegcore-gui          
          ./dist/stegcore/stegcore-gui --help

      - name: Zip output
        run: cd dist && zip -r stegcore-linux.zip stegcore/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/stegcore-linux.zip
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Windows — single merged onedir binary + stegcore-gui.exe copy
  # Symlinks require elevated privileges on Windows, so we copy instead.
  # Name detection in main.py works the same way regardless.
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UPX
        run: |
          $upxUrl = "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip"
          Invoke-WebRequest $upxUrl -OutFile upx.zip
          Expand-Archive upx.zip -DestinationPath upx_dir
          $upxPath = (Get-ChildItem upx_dir -Recurse -Filter "upx.exe").DirectoryName
          echo $upxPath | Out-File -Append -FilePath $env:GITHUB_PATH
        shell: pwsh

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install `
            customtkinter Pillow numpy ascon cryptography `
            argon2-cffi pyzstd typer rich `
            pyinstaller
        shell: pwsh

      - name: Build binary
        working-directory: ${{ github.workspace }}
        run: pyinstaller $env:GITHUB_WORKSPACE\stegcore-windows.spec
        shell: pwsh
        env:
          PYTHONUTF8: "1"

      - name: Create stegcore-gui.exe copy
        # Copy rather than symlink — symlinks need elevated privileges on Windows
        run: Copy-Item dist\stegcore\stegcore.exe dist\stegcore\stegcore-gui.exe
        shell: pwsh

      - name: Smoke-test CLI mode
        run: |
          .\dist\stegcore\stegcore.exe --help
          .\dist\stegcore\stegcore.exe ciphers
        shell: pwsh

      - name: Smoke-test GUI mode (copy name detection)
        run: |
          Test-Path dist\stegcore\stegcore-gui.exe     # confirm the copy exists
          .\dist\stegcore\stegcore-gui.exe --help      # now exits cleanly with the fix above
        shell: pwsh

      - name: Zip output
        run: Compress-Archive -Path dist\stegcore\* -DestinationPath dist\stegcore-windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist\stegcore-windows.zip
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # macOS — single merged onedir CLI + .app bundle
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UPX
        run: brew install upx

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            customtkinter Pillow numpy ascon cryptography \
            argon2-cffi pyzstd typer rich \
            pyinstaller

      - name: Build binary
        run: pyinstaller $GITHUB_WORKSPACE/stegcore-macos.spec

      - name: Create stegcore-gui symlink
        run: ln -s stegcore dist/stegcore/stegcore-gui

      - name: Smoke-test CLI mode
        run: |
          ./dist/stegcore/stegcore --help
          ./dist/stegcore/stegcore ciphers

      - name: Smoke-test GUI mode (symlink name detection)
        run: ./dist/stegcore/stegcore-gui --help

      - name: Zip CLI onedir output
        run: cd dist && zip -r stegcore-macos.zip stegcore/

      - name: Zip .app bundle (preserving symlinks and extended attributes)
        run: cd dist && zip -r --symlinks Stegcore.app.zip Stegcore.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: |
            dist/stegcore-macos.zip
            dist/Stegcore.app.zip
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Release
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-linux, build-windows, build-macos]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: release-assets

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-binary
          path: release-assets

      - name: Rename assets
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          mv release-assets/stegcore-linux.zip   release-assets/stegcore-${VERSION}-linux-x86_64.zip
          mv release-assets/stegcore-windows.zip release-assets/stegcore-${VERSION}-windows-x86_64.zip
          mv release-assets/stegcore-macos.zip   release-assets/stegcore-${VERSION}-macos-arm64.zip
          mv release-assets/Stegcore.app.zip     release-assets/Stegcore-${VERSION}-macos-arm64.app.zip

      - name: Extract changelog entry
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          VER=${VERSION#v}
          awk "/^## \[${VER}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md > release_body.md
          if [ ! -s release_body.md ]; then
            echo "Release ${VERSION}" > release_body.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Stegcore ${{ steps.version.outputs.tag }}"
          body_path: release_body.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: release-assets/stegcore-*