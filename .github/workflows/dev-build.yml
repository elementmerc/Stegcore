name: Dev Build

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  tauri:
    timeout-minutes: 45
    name: Build (${{ matrix.os-label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            os-label: linux
            arch: x64
          - platform: windows-latest
            os-label: windows
            arch: x64
          - platform: macos-latest
            os-label: macos
            arch: universal

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Create engine stub
        shell: bash
        run: |
          mkdir -p libstegcore/src
          printf '[package]\nname = "stegcore-engine"\nversion = "0.1.0"\nedition = "2021"\n\n[lib]\nname = "stegcore_engine"\n' > libstegcore/Cargo.toml
          touch libstegcore/src/lib.rs

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-dev-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Tauri app (Linux/Windows)
        if: matrix.platform != 'macos-latest'
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        with:
          args: -- --no-default-features --features custom-protocol

      - name: Build Tauri app (macOS universal)
        if: matrix.platform == 'macos-latest'
        id: tauri-build-mac
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target universal-apple-darwin -- --no-default-features --features custom-protocol

      - name: Find build artefacts
        id: find-artefacts
        shell: bash
        run: |
          echo "Searching for bundles..."
          find src-tauri/target -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.rpm" -o -name "*.nsis.zip" \) 2>/dev/null | head -20
          # Create a staging dir with all artefacts
          mkdir -p artefacts
          find src-tauri/target -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.dmg" -o -name "*.rpm" \) -exec cp {} artefacts/ \; 2>/dev/null || true
          # Windows NSIS installer
          find src-tauri/target -path "*/nsis/*" -name "*.exe" -exec cp {} artefacts/ \; 2>/dev/null || true
          ls -la artefacts/ || echo "No artefacts found"

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: stegcore-dev-${{ matrix.os-label }}-${{ matrix.arch }}
          path: artefacts/
          if-no-files-found: warn
          retention-days: 14
