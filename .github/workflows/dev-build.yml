name: Dev Build

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  tauri:
    timeout-minutes: 45
    name: Build (${{ matrix.os-label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            os-label: linux
            arch: x64
          - platform: windows-latest
            os-label: windows
            arch: x64
          - platform: macos-latest
            os-label: macos
            arch: universal

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout private engine
        id: engine
        env:
          SSH_KEY: ${{ secrets.LIBSTEGCORE_DEPLOY_KEY }}
        shell: bash
        run: |
          if [ -n "$SSH_KEY" ]; then
            mkdir -p ~/.ssh
            echo "$SSH_KEY" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
            git submodule update --init --recursive
            echo "has_engine=true" >> "$GITHUB_OUTPUT"
            echo "cargo_features=engine,custom-protocol" >> "$GITHUB_OUTPUT"
          else
            echo "No deploy key — creating stub"
            mkdir -p libstegcore/src
            printf '[package]\nname = "stegcore-engine"\nversion = "4.0.0-beta.1"\nedition = "2021"\n\n[lib]\nname = "stegcore_engine"\n' > libstegcore/Cargo.toml
            touch libstegcore/src/lib.rs
            echo "has_engine=false" >> "$GITHUB_OUTPUT"
            echo "cargo_features=custom-protocol" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-dev-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Tauri app (Linux/Windows)
        if: matrix.platform != 'macos-latest'
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: -- --no-default-features --features ${{ steps.engine.outputs.cargo_features }}

      - name: Build Tauri app (macOS universal)
        if: matrix.platform == 'macos-latest'
        id: tauri-build-mac
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target universal-apple-darwin -- --no-default-features --features ${{ steps.engine.outputs.cargo_features }}

      - name: Collect artefacts
        shell: bash
        run: |
          mkdir -p artefacts
          echo "=== Debug: find all files in target that look like bundles ==="
          find . -path "*/target/*/bundle/*" -type f 2>/dev/null || true
          find . -path "*/target/release/bundle/*" -type f 2>/dev/null || true
          find . -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.dmg" -o -name "*.rpm" 2>/dev/null | grep -v node_modules || true
          echo "=== Debug: binary locations ==="
          find . -name "stegcore-gui" -o -name "stegcore-gui.exe" 2>/dev/null | grep -v node_modules || true
          echo "=== Copying artefacts ==="
          # Bundles (any depth)
          find . \( -name "*.deb" -o -name "*.AppImage" -o -name "*.rpm" -o -name "*.msi" -o -name "*.dmg" \) -not -path "*/node_modules/*" -type f -exec cp {} artefacts/ \; 2>/dev/null || true
          # Windows NSIS
          find . -path "*/nsis/*.exe" -not -path "*/node_modules/*" -type f -exec cp {} artefacts/ \; 2>/dev/null || true
          # Raw binaries as fallback
          find . -name "stegcore-gui" -path "*/release/*" -not -path "*/node_modules/*" -type f -exec cp {} artefacts/ \; 2>/dev/null || true
          find . -name "stegcore-gui.exe" -path "*/release/*" -not -path "*/node_modules/*" -type f -exec cp {} artefacts/ \; 2>/dev/null || true
          echo "=== Final artefacts ==="
          ls -la artefacts/ 2>/dev/null && echo "Artefacts found" || echo "No artefacts found"
          # Ensure at least an empty file so upload doesn't fail
          touch artefacts/.keep

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: stegcore-dev-${{ matrix.os-label }}-${{ matrix.arch }}
          path: artefacts/
          if-no-files-found: warn
          retention-days: 14

  docker:
    name: Docker build test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: stegcore:dev-test
          platforms: linux/amd64
