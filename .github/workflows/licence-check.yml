name: Licence Header Check

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-headers:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check AGPL-3.0 headers
        run: |
          fail=0
          while IFS= read -r f; do
            if ! grep -q "AGPL-3.0-or-later" "$f"; then
              echo "MISSING AGPL header: $f"
              fail=1
            fi
          done < <(find . \( -name "*.rs" -o -name "*.ts" -o -name "*.tsx" \) \
            -not -path "./target/*" \
            -not -path "./node_modules/*" \
            -not -path "./frontend/node_modules/*" \
            -not -path "./.git/*" \
            -not -path "./libstegcore/*")
          if [ "$fail" -eq 1 ]; then
            echo ""
            echo "All .rs/.ts/.tsx files must include the AGPL-3.0 header."
            echo "See CONTRIBUTING.md for the required header block."
            exit 1
          fi
          echo "All source files carry the AGPL-3.0 header."
