ShortDescription: Crypto-steganography toolkit — hide encrypted messages inside ordinary files
Description: |-
  Stegcore combines encryption and steganography into a single cross-platform
  toolkit. It encrypts your payload and hides the ciphertext inside ordinary
  image or audio files. Features three AEAD ciphers, deniable dual-payload mode,
  built-in steganalysis suite, and both GUI and CLI interfaces.
